language: cpp
sudo: required

before_install:
    - ./admin/travis-install-deps.sh

matrix:
    include:
        - os: linux
          dist: xenial
          compiler: clang
          env: ARCH=amd64 DO=distcheck AS_ROOT=no
        - os: linux
          dist: xenial
          compiler: gcc
          env: ARCH=amd64 DO=distcheck AS_ROOT=no
        - os: linux
          dist: xenial
          compiler: clang
          env: ARCH=amd64 DO=apidocs
        - os: linux
          dist: xenial
          compiler: clang
          env: ARCH=amd64 DO=style
        - os: linux
          dist: xenial
          compiler: clang
          env: ARCH=amd64 DO=distcheck AS_ROOT=yes UNPRIVILEGED_USER=no
        - os: linux
          dist: xenial
          compiler: clang
          env: ARCH=amd64 DO=distcheck AS_ROOT=yes UNPRIVILEGED_USER=yes
        - os: osx
          compiler: clang
          env: ARCH=amd64 DO=distcheck AS_ROOT=no
        - os: osx
          compiler: gcc
          env: ARCH=amd64 DO=distcheck AS_ROOT=no
        - os: osx
          compiler: clang
          env: ARCH=amd64 DO=distcheck AS_ROOT=yes UNPRIVILEGED_USER=yes
        - os: osx
          compiler: gcc
          env: ARCH=amd64 DO=distcheck AS_ROOT=yes UNPRIVILEGED_USER=yes
        # TODO(ngie): reenable i386; the libraries were not available in the
        #             Ubuntu Xenial x86_64 docker image.

addons:
    homebrew:
        update: true

script:
    - ./admin/travis-build.sh

notifications:
    email:
        - kyua-log@googlegroups.com
